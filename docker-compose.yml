services:
  wms-demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: wms-demo:latest
    container_name: wms-demo
    ports:
      - "3000:80"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
