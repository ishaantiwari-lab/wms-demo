apiVersion: apps/v1
kind: Deployment
metadata:
  name: wms-demo
  labels:
    app: wms-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wms-demo
  template:
    metadata:
      labels:
        app: wms-demo
    spec:
      containers:
        - name: wms-demo
          image: wms-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: wms-demo
spec:
  selector:
    app: wms-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
